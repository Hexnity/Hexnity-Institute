version: '3.8'
services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER_LOWERSCASE}/${REPO_NAME}:latest
    # Using user 82:82 (www-data in Alpine/FrankenPHP) ensures the container 
    # has permission to write to the volumes we are mounting.
    user: "82:82"
    environment:
      - CRAFT_ENVIRONMENT=production
      - CRAFT_DB_DRIVER=pgsql
      - CRAFT_DB_SERVER=db
      - CRAFT_DB_PORT=5432
      - CRAFT_DB_DATABASE=${CRAFT_DB_DATABASE}
      - CRAFT_DB_USER=${CRAFT_DB_USER}
      - CRAFT_DB_PASSWORD=${CRAFT_DB_PASSWORD}
      - CRAFT_DB_SCHEMA=public
      - CRAFT_SECURITY_KEY=${CRAFT_SECURITY_KEY}
      - CRAFT_APP_ID=${CRAFT_APP_ID}
      - SERVER_NAME=:80
      - CADDY_GLOBAL_OPTIONS=local_certs
      # Ensure these are also in your Coolify Environment Variables
      - ASSET_BASE_URL=${ASSET_BASE_URL:-https://edu.hexnity.com/uploads}
      - ASSET_BASE_PATH=/app/web/uploads
    volumes:
      - craft-storage:/app/storage
      - craft-cpresources:/app/web/cpresources
      # Added this line to fix your persistent uploads
      - craft-uploads:/app/web/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      - POSTGRES_DB=${CRAFT_DB_DATABASE}
      - POSTGRES_USER=${CRAFT_DB_USER}
      - POSTGRES_PASSWORD=${CRAFT_DB_PASSWORD}
    volumes:
      - craft-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CRAFT_DB_USER} -d ${CRAFT_DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  craft-storage:
  craft-cpresources:
  craft-db-data:
  # Added this to the persistent volume list
  craft-uploads: